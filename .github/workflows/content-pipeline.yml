name: Content Pipeline

on:
  schedule:
    # Mon, Wed, Fri at 14:00 UTC (10am ET) — 3x/week
    # Per-site caps in generate-content.ts limit articles per phase
    - cron: '0 14 * * 1,3,5'
  workflow_dispatch:
    inputs:
      batch_size:
        description: 'Max articles to generate (overall ceiling)'
        required: false
        default: '5'
      dry_run:
        description: 'Dry run (true/false)'
        required: false
        default: 'false'

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install pipeline dependencies
        run: npm install @anthropic-ai/sdk tsx

      - name: Run content pipeline
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          REVALIDATION_SECRET: ${{ secrets.REVALIDATION_SECRET }}
          AMAZON_ASSOCIATE_TAG: ${{ secrets.AMAZON_ASSOCIATE_TAG }}
          BATCH_SIZE: ${{ github.event.inputs.batch_size || '5' }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: npx tsx scripts/generate-content.ts
